name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: |
          cd packages/photo_sync_core && dart pub get
          cd ../../app_mobile && flutter pub get
      - name: Create Android platform files
        run: |
          cd app_mobile
          if [ ! -d "android" ]; then flutter create --platforms=android . ; fi
      - name: Setup signing keystore
        run: |
          cd app_mobile/android/app
          base64 -d photosync-release.jks.b64 > photosync-release.jks
          echo "Keystore decoded, size: $(wc -c < photosync-release.jks)"
      - name: Patch Android config
        run: |
          cd app_mobile/android

          cat > settings.gradle << 'SETTINGS_EOF'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()
              includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.5.0" apply false
              id "org.jetbrains.kotlin.android" version "2.0.0" apply false
          }
          include ":app"
          SETTINGS_EOF

          sed -i "s|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.7-all.zip|" gradle/wrapper/gradle-wrapper.properties

          cat > app/build.gradle << 'GRADLE_EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          def keystoreFile = rootProject.file("app/photosync-release.jks")

          android {
              namespace = "com.photosync.app"
              compileSdk = 36
              ndkVersion = "26.1.10909125"

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_1_8
                  targetCompatibility = JavaVersion.VERSION_1_8
                  coreLibraryDesugaringEnabled = true
              }

              kotlinOptions {
                  jvmTarget = JavaVersion.VERSION_1_8
              }

              signingConfigs {
                  release {
                      storeFile keystoreFile
                      storePassword "photosync123"
                      keyAlias "photosync"
                      keyPassword "photosync123"
                  }
              }

              defaultConfig {
                  applicationId = "com.photosync.app"
                  minSdk = 21
                  targetSdk = 34
                  versionCode = flutter.versionCode
                  versionName = flutter.versionName
                  multiDexEnabled = true
              }

              buildTypes {
                  debug {
                      signingConfig = signingConfigs.release
                  }
                  release {
                      signingConfig = signingConfigs.release
                  }
              }
          }

          flutter {
              source = "../.."
          }

          dependencies {
              coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
          }
          GRADLE_EOF

          cat > app/src/main/AndroidManifest.xml << 'MANIFEST_EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.CHANGE_WIFI_MULTICAST_STATE"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <application android:label="PhotoSync" android:name="${applicationName}" android:icon="@mipmap/ic_launcher" android:requestLegacyExternalStorage="true">
                  <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop" android:taskAffinity="" android:theme="@style/LaunchTheme" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode" android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/>
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
              <queries><intent><action android:name="android.intent.action.PROCESS_TEXT"/><data android:mimeType="text/plain"/></intent></queries>
          </manifest>
          MANIFEST_EOF

          # 5) 修复 MainActivity 包名：移动到 com.photosync.app 目录下
          MAIN_SRC=app/src/main/kotlin
          ORIG_MAIN=$(find $MAIN_SRC -name "MainActivity.kt" 2>/dev/null | head -1)
          if [ -n "$ORIG_MAIN" ]; then
            mkdir -p $MAIN_SRC/com/photosync/app
            sed 's/^package .*/package com.photosync.app/' "$ORIG_MAIN" > $MAIN_SRC/com/photosync/app/MainActivity.kt
            echo "Fixed MainActivity package to com.photosync.app"
          fi

      - name: Build Release APK
        run: cd app_mobile && flutter build apk --release
      - name: Rename APK with version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          cp app_mobile/build/app/outputs/flutter-apk/app-release.apk \
             app_mobile/build/app/outputs/flutter-apk/PhotoSync-${VERSION}.apk
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app_mobile/build/app/outputs/flutter-apk/PhotoSync-*.apk
            app_mobile/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
          draft: false
          prerelease: false
