name: Build All Platforms

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: |
          cd packages/photo_sync_core && dart pub get
          cd ../../app_mobile && flutter pub get
      - name: Create Android platform files
        run: |
          cd app_mobile
          if [ ! -d "android" ]; then flutter create --platforms=android . ; fi
      - name: Patch Android config
        run: |
          cd app_mobile/android

          # 1) 覆写 settings.gradle: Kotlin 2.0.0 + AGP 8.5.0
          cat > settings.gradle << 'SETTINGS_EOF'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()
              includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.5.0" apply false
              id "org.jetbrains.kotlin.android" version "2.0.0" apply false
          }
          include ":app"
          SETTINGS_EOF

          # 2) 升级 Gradle wrapper -> 8.7
          sed -i "s|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.7-all.zip|" gradle/wrapper/gradle-wrapper.properties

          # 3) 覆写 app/build.gradle
          cat > app/build.gradle << 'GRADLE_EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          android {
              namespace = "com.photosync.app"
              compileSdk = 36
              ndkVersion = "26.1.10909125"

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_1_8
                  targetCompatibility = JavaVersion.VERSION_1_8
                  coreLibraryDesugaringEnabled = true
              }

              kotlinOptions {
                  jvmTarget = JavaVersion.VERSION_1_8
              }

              defaultConfig {
                  applicationId = "com.photosync.app"
                  minSdk = 21
                  targetSdk = 34
                  versionCode = flutter.versionCode
                  versionName = flutter.versionName
                  multiDexEnabled = true
              }

              buildTypes {
                  release {
                      signingConfig = signingConfigs.debug
                  }
              }
          }

          flutter {
              source = "../.."
          }

          dependencies {
              coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
          }
          GRADLE_EOF

          # 4) 覆写 AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST_EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.CHANGE_WIFI_MULTICAST_STATE"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <application android:label="PhotoSync" android:name="${applicationName}" android:icon="@mipmap/ic_launcher" android:requestLegacyExternalStorage="true">
                  <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop" android:taskAffinity="" android:theme="@style/LaunchTheme" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode" android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/>
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
              <queries><intent><action android:name="android.intent.action.PROCESS_TEXT"/><data android:mimeType="text/plain"/></intent></queries>
          </manifest>
          MANIFEST_EOF

          echo "=== Patched settings.gradle ==="
          head -5 settings.gradle
          echo "=== Patched app/build.gradle ==="
          head -15 app/build.gradle
          echo "=== Gradle wrapper ==="
          grep distributionUrl gradle/wrapper/gradle-wrapper.properties
      - name: Build Release APK
        run: cd app_mobile && flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: PhotoSync-Android
          path: app_mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-windows:
    name: Windows Desktop
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      - name: Build
        run: |
          flutter config --enable-windows-desktop
          cd packages/photo_sync_core; dart pub get
          cd ../../app_desktop; flutter pub get
          if (!(Test-Path "windows")) { flutter create --platforms=windows . }
          flutter build windows --release
        shell: pwsh
      - name: Package
        run: |
          cd app_desktop/build/windows/x64/runner/Release
          Compress-Archive -Path * -DestinationPath PhotoSync-Windows.zip
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: PhotoSync-Windows
          path: app_desktop/build/windows/x64/runner/Release/PhotoSync-Windows.zip
          retention-days: 30

  build-macos:
    name: macOS Desktop
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      - name: Build
        run: |
          flutter config --enable-macos-desktop
          cd packages/photo_sync_core && dart pub get
          cd ../../app_desktop && flutter pub get
          if [ ! -d "macos" ]; then flutter create --platforms=macos . ; fi
          cd macos/Runner
          for f in DebugProfile.entitlements Release.entitlements; do
            cat > $f << 'ENTITLEMENTS_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.app-sandbox</key><true/>
              <key>com.apple.security.network.server</key><true/>
              <key>com.apple.security.network.client</key><true/>
              <key>com.apple.security.files.user-selected.read-write</key><true/>
              <key>com.apple.security.files.downloads.read-write</key><true/>
          </dict>
          </plist>
          ENTITLEMENTS_EOF
          done
          cd ../..
          flutter build macos --release
      - name: Package
        run: |
          cd app_desktop/build/macos/Build/Products/Release
          zip -r PhotoSync-macOS.zip *.app
      - uses: actions/upload-artifact@v4
        with:
          name: PhotoSync-macOS
          path: app_desktop/build/macos/Build/Products/Release/PhotoSync-macOS.zip
          retention-days: 30

  build-linux:
    name: Linux Desktop
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      - name: Build
        run: |
          flutter config --enable-linux-desktop
          cd packages/photo_sync_core && dart pub get
          cd ../../app_desktop && flutter pub get
          if [ ! -d "linux" ]; then flutter create --platforms=linux . ; fi
          flutter build linux --release
      - name: Package
        run: |
          cd app_desktop/build/linux/x64/release/bundle
          tar czf PhotoSync-Linux.tar.gz *
      - uses: actions/upload-artifact@v4
        with:
          name: PhotoSync-Linux
          path: app_desktop/build/linux/x64/release/bundle/PhotoSync-Linux.tar.gz
          retention-days: 30
