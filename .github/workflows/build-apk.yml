name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install core dependencies
        run: |
          cd packages/photo_sync_core
          dart pub get

      - name: Install mobile dependencies
        run: |
          cd app_mobile
          flutter pub get

      - name: Create Android platform files
        run: |
          cd app_mobile
          if [ ! -d "android" ]; then
            flutter create --platforms=android .
          fi

      - name: Configure Android manifest
        run: |
          cat > app_mobile/android/app/src/main/AndroidManifest.xml << 'MANIFEST_EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.CHANGE_WIFI_MULTICAST_STATE"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>

              <application
                  android:label="PhotoSync"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:requestLegacyExternalStorage="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2"/>
              </application>

              <queries>
                  <intent>
                      <action android:name="android.intent.action.PROCESS_TEXT"/>
                      <data android:mimeType="text/plain"/>
                  </intent>
              </queries>
          </manifest>
          MANIFEST_EOF

      - name: Configure Kotlin and Gradle
        run: |
          cd app_mobile/android

          cat > settings.gradle << 'SETTINGS_EOF'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()

              includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.5.0" apply false
              id "org.jetbrains.kotlin.android" version "2.0.0" apply false
          }

          include ":app"
          SETTINGS_EOF

          cd app
          sed -i 's/minSdk\s*=\s*[0-9]*/minSdk = 21/' build.gradle
          sed -i 's/targetSdk\s*=\s*[0-9]*/targetSdk = 34/' build.gradle
          sed -i 's/compileSdk\s*=\s*[0-9]*/compileSdk = 34/' build.gradle
          sed -i 's/applicationId\s*=\s*"[^"]*"/applicationId = "com.photosync.app"/' build.gradle || true

      - name: Build Debug APK
        run: |
          cd app_mobile
          flutter build apk --debug

      - name: Build Release APK
        run: |
          cd app_mobile
          flutter build apk --release

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app_mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app_mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: APK Info
        run: |
          echo "=== Debug APK ==="
          ls -lh app_mobile/build/app/outputs/flutter-apk/app-debug.apk
          echo ""
          echo "=== Release APK ==="
          ls -lh app_mobile/build/app/outputs/flutter-apk/app-release.apk
